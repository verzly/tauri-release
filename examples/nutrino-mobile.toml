[project]
project_dir = "apps/mobile"
package_manager = "pnpm"

[container]
engine = "podman"
linux_image = "localhost/tauri-release-linux:latest"
android_image = "localhost/tauri-release-android:latest"

[output]
dir = "dist/tauri-release/mobile"
clean = true
sha256 = true
manifest = true

[linux]
enabled = false

[android]
enabled = true
apk = true
aab = true
split_per_abi = false
targets = ["aarch64"]

[windows]
enabled = false
strategy = "host-only"

[macos]
enabled = false
strategy = "host-only"

[ios]
enabled = false
strategy = "host-only"
