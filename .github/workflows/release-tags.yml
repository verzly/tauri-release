name: Update release tags

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to tag. Defaults to the current master branch.
        required: false
        default: master

permissions:
  contents: write

jobs:
  update-release-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve checkout ref
        id: ref
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.ref }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            REF="${{ github.event.release.tag_name }}"
          elif [ -n "${GITHUB_SHA:-}" ]; then
            REF="${GITHUB_SHA}"
          else
            REF="master"
          fi

          if [ -z "${REF:-}" ]; then
            REF="master"
          fi

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Checkout ref: $REF"

      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Resolve Cargo package version
        id: package
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(python3 -c 'import re, pathlib; content = pathlib.Path("Cargo.toml").read_text(encoding="utf-8"); match = re.search(r"^version\s*=\s*\"([^\"]+)\"", content, re.MULTILINE); print(match.group(1) if match else "")')"

          if [ -z "${VERSION:-}" ]; then
            echo "Could not resolve Cargo package version."
            exit 1
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Cargo.toml package.version must be SemVer compatible. Got: $VERSION"
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR _PATCH_AND_SUFFIX <<< "$VERSION"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_tag=v$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor_tag=v$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"
          echo "Resolved moving tags: latest, v$MAJOR, v$MAJOR.$MINOR"

      - name: Validate release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ github.event.release.tag_name }}"
          VERSION_TAG="${{ steps.package.outputs.version_tag }}"

          if [ "${RELEASE_TAG}" != "${VERSION_TAG}" ]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match Cargo.toml package.version tag ${VERSION_TAG}."
            exit 1
          fi

      - name: Create version tag and move release channel tags
        shell: bash
        run: |
          set -euo pipefail

          VERSION_TAG="${{ steps.package.outputs.version_tag }}"
          MINOR_TAG="${{ steps.package.outputs.minor_tag }}"
          MAJOR_TAG="${{ steps.package.outputs.major_tag }}"
          TARGET_SHA="$(git rev-parse HEAD)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/${VERSION_TAG}" >/dev/null; then
            EXISTING_SHA="$(git rev-list -n 1 "${VERSION_TAG}")"

            if [ "${EXISTING_SHA}" != "${TARGET_SHA}" ]; then
              echo "::error::${VERSION_TAG} already exists at ${EXISTING_SHA}. Bump Cargo.toml package.version before publishing a new release commit."
              exit 1
            fi

            echo "Version tag ${VERSION_TAG} already points to ${TARGET_SHA}."
          else
            git tag "${VERSION_TAG}" "${TARGET_SHA}"
            git push origin "refs/tags/${VERSION_TAG}"
            echo "Created version tag ${VERSION_TAG} -> ${TARGET_SHA}."
          fi

          for MOVING_TAG in latest "${MINOR_TAG}" "${MAJOR_TAG}"; do
            git tag -f "${MOVING_TAG}" "${TARGET_SHA}"
            git push origin "refs/tags/${MOVING_TAG}" --force
            echo "Updated ${MOVING_TAG} -> ${VERSION_TAG} (${TARGET_SHA})."
          done
