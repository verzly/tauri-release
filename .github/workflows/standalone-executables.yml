name: Build standalone executables

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build. Defaults to the current master branch.
        required: false
        default: master

permissions:
  contents: write

concurrency:
  group: standalone-${{ github.workflow }}-${{ github.event.release.tag_name || github.ref_name || github.sha }}
  cancel-in-progress: true

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package.outputs.version }}
      version_tag: ${{ steps.package.outputs.version_tag }}
      checkout_ref: ${{ steps.package.outputs.version_tag }}

    steps:
      - name: Resolve checkout ref
        id: ref
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.ref }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            REF="${{ github.event.release.tag_name }}"
          elif [ -n "${GITHUB_SHA:-}" ]; then
            REF="${GITHUB_SHA}"
          else
            REF="master"
          fi

          if [ -z "${REF:-}" ]; then
            REF="master"
          fi

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Checkout ref: $REF"

      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Resolve Cargo package version
        id: package
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(python3 -c 'import re, pathlib; content = pathlib.Path("Cargo.toml").read_text(encoding="utf-8"); match = re.search(r"^version\s*=\s*\"([^\"]+)\"", content, re.MULTILINE); print(match.group(1) if match else "")')"

          if [ -z "${VERSION:-}" ]; then
            echo "Could not resolve Cargo package version."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Validate release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ github.event.release.tag_name }}"
          VERSION_TAG="${{ steps.package.outputs.version_tag }}"

          if [ "${RELEASE_TAG}" != "${VERSION_TAG}" ]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match Cargo.toml package.version tag ${VERSION_TAG}."
            exit 1
          fi

      - name: Validate release tag state
        shell: bash
        run: |
          set -euo pipefail

          VERSION_TAG="${{ steps.package.outputs.version_tag }}"
          TARGET_SHA="$(git rev-parse HEAD)"


          if ! git rev-parse -q --verify "refs/tags/${VERSION_TAG}" >/dev/null; then
            echo "::error::Release tag ${VERSION_TAG} does not exist. Publish the GitHub Release or run the Update release tags workflow first."
            exit 1
          fi

          EXISTING_SHA="$(git rev-list -n 1 "${VERSION_TAG}")"
          if [ "${EXISTING_SHA}" != "${TARGET_SHA}" ]; then
            echo "::error::${VERSION_TAG} points to ${EXISTING_SHA}, but this build checked out ${TARGET_SHA}."
            exit 1
          fi

          echo "Validated ${VERSION_TAG} -> ${TARGET_SHA}."


  build-standalone:
    needs: resolve-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}
    env:
      PACKAGE_NAME: tauri-release
      RELEASE_BINS: "tauri-release"
      CARGO_RELEASE_BOOTSTRAP_MODE: "cargo-release-latest"

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout cargo-release action
        uses: actions/checkout@v4
        with:
          repository: verzly/cargo-release
          ref: v0.1
          path: .github/actions/cargo-release
          token: ${{ secrets.CARGO_RELEASE_TOKEN || github.token }}

      - name: Install cargo-release release tool
        uses: ./.github/actions/cargo-release
        with:
          install-only: true
          github-token: ${{ secrets.CARGO_RELEASE_TOKEN || github.token }}


      - name: Resolve host target
        id: host
        shell: bash
        run: |
          set -euo pipefail

          HOST="$(rustc -vV | awk '/^host: / {print $2}')"
          EXT=""

          if [ "${RUNNER_OS}" = "Windows" ]; then
            EXT=".exe"
          fi

          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "ext=$EXT" >> "$GITHUB_OUTPUT"
          echo "Resolved host target: $HOST"

      - name: Build standalone executables through cargo-release
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.resolve-release.outputs.version }}"
          HOST="${{ steps.host.outputs.host }}"
          EXT="${{ steps.host.outputs.ext }}"
          PLATFORM="${{ matrix.platform }}"

          rm -rf dist
          mkdir -p dist/assets dist/work .github/release .cache/cargo-release/standalone

          build_one() {
            BIN="$1"
            OUT_DIR="dist/work/${BIN}"
            CONFIG=".github/release/${BIN}.standalone.cargo-release.toml"

            cat > "${CONFIG}" <<EOF
          [project]
          project_dir = "."
          package_name = "${PACKAGE_NAME}"
          binary_name = "${BIN}"
          version = "${VERSION}"
          cargo_args = []

          [container]
          engine = "podman"
          cache_dir = ".cache/cargo-release/standalone"
          linux_image = "docker.io/library/ubuntu:22.04"
          windows_image = "docker.io/library/ubuntu:22.04"
          macos_image = "docker.io/joseluisq/rust-linux-darwin-builder:2.0.0-beta.1"
          userns_keep_id = true

          [output]
          dir = "${OUT_DIR}"
          clean = true
          sha256 = false
          manifest = false

          [artifacts]
          include_extensions = ["exe"]
          include_files = []
          keep_relative_paths = false

          [linux]
          enabled = true
          strategy = "auto"
          target = ["${HOST}"]
          output_suffix = "standalone"

          [windows]
          enabled = true
          strategy = "auto"
          target = ["${HOST}"]
          output_suffix = "standalone"

          [macos]
          enabled = true
          strategy = "auto"
          target = ["${HOST}"]
          output_suffix = "standalone"
          EOF

            cargo-release build --config "${CONFIG}" "--${PLATFORM}" --verbose

            SOURCE=""
            while IFS= read -r candidate; do
              base="$(basename "${candidate}")"
              if [[ "${base}" == "${BIN}"* ]] && [[ "${base}" != *.sha256 ]] && [[ "${base}" != *.json ]]; then
                SOURCE="${candidate}"
                break
              fi
            done < <(find "${OUT_DIR}" -maxdepth 6 -type f | sort)

            if [ -z "${SOURCE}" ]; then
              echo "Could not find standalone executable for ${BIN} under ${OUT_DIR}."
              find "${OUT_DIR}" -maxdepth 6 -type f -print || true
              exit 1
            fi

            ASSET="${BIN}-v${VERSION}-${HOST}${EXT}"
            cp "${SOURCE}" "dist/assets/${ASSET}"

            if [ "${RUNNER_OS}" != "Windows" ]; then
              chmod 755 "dist/assets/${ASSET}"
            fi

            if command -v sha256sum >/dev/null 2>&1; then
              (cd dist/assets && sha256sum "${ASSET}" > "${ASSET}.sha256")
            else
              (cd dist/assets && shasum -a 256 "${ASSET}" > "${ASSET}.sha256")
            fi
          }

          for BIN in ${RELEASE_BINS}; do
            build_one "${BIN}"
          done

          find dist/assets -maxdepth 1 -type f -print | sort

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.platform }}
          path: dist/assets/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.version_tag }}
          files: dist/assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
